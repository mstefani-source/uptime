services:
  redis:
    image: redis:7-alpine
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

networks:
  redis-net:
    name: redis-network
    driver: bridge
  default:
    external: true
    name: docker_default
